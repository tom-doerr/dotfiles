$font = Monospace

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 3, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    color = rgba(080d12ff)
}

input-field {
    monitor =
    size = 720, 72
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    inner_color = rgba(080d12dd)
    font_color = rgba(e8f5f8ff)
    fail_color = rgba(ff4d6dee)
    check_color = rgba(00ff99ee)
    placeholder_text = Password
    fail_text = $PAMFAIL
    fade_on_empty = false
    rounding = 8
    font_family = $font
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 92
    font_family = $font
    color = rgba(f4fbffff)
    position = 48, -42
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 24
    font_family = $font
    color = rgba(c6d4d9ff)
    position = 54, -150
    halign = left
    valign = top
}
